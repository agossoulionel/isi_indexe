<html lang="fr" dir="ltr">
<head>
<meta charset="UTF-8">

<title>Sommeil & Bien-être Étudiant / Sleep & Student Wellbeing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
:root{
  --primaire:#1E2A4A;
  --secondaire:#4C5FD7;
  --accent:#F2A65A;
  --fond:#F7F8FC;
  --vert:#2E8B6A;
  --jaune:#E2A92E;
  --orange:#E2722E;
  --rouge:#C0392B;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--fond);color:#1a1a2a;}
h1,h2,h3{font-family:'Poppins',sans-serif;}
.barre-haut{
  position:fixed;top:0;left:0;height:4px;
  background:linear-gradient(90deg,var(--secondaire),var(--accent));
  width:0%;transition:width .4s ease;z-index:1000;
}
header{
  position:fixed;top:4px;left:0;right:0;
  background:linear-gradient(135deg,var(--primaire),var(--secondaire));
  color:#fff;padding:14px 20px;z-index:999;
  box-shadow:0 2px 10px rgba(0,0,0,.18);
}
.entete-ligne{display:flex;justify-content:space-between;align-items:center;}
.entete-titre{display:flex;align-items:center;gap:8px;}
.entete-titre h1{margin:0;font-size:15px;font-weight:700;}
.icone-lune{flex-shrink:0;}
.btn-lang{
  background:#fff;color:var(--primaire);border:none;border-radius:6px;
  padding:6px 14px;font-weight:700;cursor:pointer;font-size:13px;font-family:'Poppins',sans-serif;
}
.etapes{display:flex;justify-content:center;gap:7px;margin-top:12px;}
.etape{
  width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,.25);
  color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;
  justify-content:center;transition:.3s;
}
.etape.actif{background:var(--accent);color:var(--primaire);}
.etape.complete{background:#fff;color:var(--primaire);}
main{max-width:740px;margin:0 auto;padding:108px 16px 50px;}
.page{display:none;}
.page.actif{display:block;animation:apparition .35s ease;}
@keyframes apparition{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.carte{
  background:#fff;border-radius:14px;box-shadow:0 4px 16px rgba(30,42,74,.08);
  padding:28px;margin-bottom:16px;
}
.carte h2{color:var(--primaire);margin-top:0;font-size:21px;}
.carte h3{color:var(--secondaire);margin:0 0 10px;font-size:13px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;}
.contexte{font-size:14.5px;line-height:1.6;color:#3a3a4a;}
.objectif-general{
  background:#F0F2FC;border-left:4px solid var(--secondaire);border-radius:8px;
  padding:14px 16px;font-size:14px;font-weight:600;color:var(--primaire);margin:16px 0;
}
.liste-objectifs{font-size:13.5px;line-height:1.7;color:#3a3a4a;padding-left:20px;margin:10px 0 18px;}
.meta-ligne{display:flex;gap:18px;flex-wrap:wrap;font-size:13.5px;color:#555;margin:14px 0;}
.note-confidentialite{
  font-size:12.5px;color:#666;margin-top:18px;line-height:1.55;
  border-top:1px dashed #ddd;padding-top:14px;
}
.btn-principal{
  display:block;width:100%;background:var(--primaire);color:#fff;border:none;
  border-radius:9px;padding:15px;font-size:16px;font-weight:700;cursor:pointer;
  margin-top:16px;font-family:'Poppins',sans-serif;letter-spacing:.2px;
}
.btn-principal:hover{opacity:.92;}
.btn-secondaire{
  display:block;width:100%;background:transparent;color:var(--primaire);
  border:2px solid var(--primaire);border-radius:9px;padding:13px;font-size:15px;
  font-weight:700;cursor:pointer;margin-top:10px;font-family:'Poppins',sans-serif;
}
.champ{margin-bottom:16px;}
.champ label{display:block;font-weight:600;margin-bottom:6px;font-size:14px;color:#2a2a3a;}
.champ select{
  width:100%;padding:11px;border:1px solid #d8dae8;border-radius:8px;
  font-size:15px;font-family:inherit;background:#fff;color:#1a1a2a;
}
.champ select:focus{outline:2px solid var(--secondaire);outline-offset:1px;}
.erreur{color:var(--rouge);font-size:13px;margin-top:10px;display:none;font-weight:600;}
.item-bloc{margin-bottom:24px;padding-bottom:18px;border-bottom:1px solid #eee;}
.item-bloc:last-child{border-bottom:none;}
.item-num{color:var(--secondaire);font-weight:700;font-size:12px;letter-spacing:.5px;}
.item-texte{font-weight:600;margin:6px 0 12px;font-size:15px;color:#1a1a2a;}
.echelle{display:flex;gap:6px;flex-wrap:wrap;}
.opt-label{
  flex:1;min-width:58px;border:1px solid #d8dae8;border-radius:8px;
  overflow:hidden;cursor:pointer;text-align:center;transition:.2s;
}
.opt-label:hover{border-color:var(--secondaire);}
.opt-label input{position:absolute;opacity:0;width:0;height:0;}
.opt-label span{display:block;padding:9px 4px;font-size:11px;font-weight:600;line-height:1.3;}
.opt-label input:checked + span{background:var(--accent);color:var(--primaire);}
.isi-soustitre{font-size:12.5px;color:#888;margin:-8px 0 16px;font-style:italic;}
.jauge-conteneur{position:relative;height:36px;border-radius:18px;overflow:hidden;display:flex;margin:26px 0 6px;}
.jauge-segment{flex:1;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;}
.seg-vert{background:var(--vert);}
.seg-jaune{background:var(--jaune);}
.seg-orange{background:var(--orange);}
.seg-rouge{background:var(--rouge);}
.jauge-marqueur{
  position:absolute;top:-11px;width:0;height:0;left:0%;
  border-left:9px solid transparent;border-right:9px solid transparent;
  border-top:11px solid var(--primaire);transform:translateX(-9px);
  transition:left 1.1s cubic-bezier(.2,.8,.2,1);
}
.score-total{font-size:38px;font-weight:800;color:var(--primaire);text-align:center;margin:18px 0 4px;font-family:'Poppins',sans-serif;}
.interpretation{text-align:center;font-size:15px;font-weight:700;padding:14px;border-radius:9px;margin:14px 0 6px;}
.interpretation .cat{display:block;font-size:17px;margin-bottom:4px;}
.interpretation.absence{background:#e8f6ef;color:var(--vert);}
.interpretation.legere{background:#fdf6e3;color:var(--jaune);}
.interpretation.moderee{background:#fdecdc;color:var(--orange);}
.interpretation.severe{background:#fdecea;color:var(--rouge);}
.pied-page{text-align:center;font-size:12px;color:#999;margin-top:30px;}
.toast{
  position:fixed;bottom:20px;right:20px;background:var(--vert);color:#fff;
  padding:12px 20px;border-radius:8px;box-shadow:0 2px 10px rgba(0,0,0,.25);
  display:none;z-index:2000;font-size:14px;font-weight:600;max-width:260px;
}
.toast.erreur{background:var(--rouge);}
@media print{
  header,.barre-haut,.btn-secondaire,#p0,#p1,#p2,#p3{display:none !important;}
  main{padding-top:10px;}
}
</style>
</head>

// 4. Navigation entre pages (n = numéro de page cible)
function allerA(n) {
  document.getElementById("p" + pageN).classList.remove("actif");
  pageN = n;
  document.getElementById("p" + pageN).classList.add("actif");
  majPts();
  window.scrollTo(0, 0);
  if (n === 3) {
    buildItems();
  }
}
 
// 5. Mise à jour de la barre de progression et du stepper
function majPts() {
  var pourcentage = (pageN / 4) * 100;
  document.getElementById("barreHaut").style.width = pourcentage + "%";
 
  var i;
  for (i = 0; i <= 4; i++) {
    (function (idx) {
      var el = document.getElementById("etape" + idx);
      if (!el) { return; }
      if (idx < pageN) {
        el.className = "etape complete";
      } else if (idx === pageN) {
        el.className = "etape actif";
      } else {
        el.className = "etape";
      }
    })(i);
  }
}

// Fonction utilitaire : remplit un <select> en conservant l'index choisi
function remplirSelect(idChamp, options) {
  var select = document.getElementById(idChamp);
  var indexActuel = select.selectedIndex;
  select.innerHTML = "";
  var i;
  for (i = 0; i < options.length; i++) {
    (function (idx) {
      var opt = document.createElement("option");
      opt.value = idx;
      opt.textContent = options[idx];
      select.appendChild(opt);
    })(i);
  }
  if (indexActuel >= 0 && indexActuel < options.length) {
    select.selectedIndex = indexActuel;
  } else {
    select.selectedIndex = -1;
  }
}
 
// Fonction utilitaire : remplit une liste <ul> à partir d'un tableau de textes
function remplirListe(idListe, items) {
  var ul = document.getElementById(idListe);
  ul.innerHTML = "";
  var i;
  for (i = 0; i < items.length; i++) {
    var li = document.createElement("li");
    li.textContent = items[i];
    ul.appendChild(li);
  }
}

// 10. Construction dynamique des 7 items de l'échelle ISI
function buildItems() {
  var conteneur = document.getElementById("itemsISI");
  conteneur.innerHTML = "";
  var items = T[lng].isiItems;
  var i;
 
  for (i = 0; i < 7; i++) {
    (function (idx) {
      var item = items[idx];
      var bloc = document.createElement("div");
      bloc.className = "item-bloc";
 
      var numero = document.createElement("div");
      numero.className = "item-num";
      numero.textContent = (idx + 1) + " / 7";
      bloc.appendChild(numero);
 
      var texte = document.createElement("div");
      texte.className = "item-texte";
      texte.textContent = item.texte;
      bloc.appendChild(texte);
 
      var echelleDiv = document.createElement("div");
      echelleDiv.className = "echelle";
 
      var j;
      for (j = 0; j < 5; j++) {
        (function (val) {
          var label = document.createElement("label");
          label.className = "opt-label";
 
          var input = document.createElement("input");
          input.type = "radio";
          input.name = "isi_" + idx;
          input.value = val;
          if (reponsesISI["isi_" + idx] === val) {
            input.checked = true;
          }
          input.onchange = function () {
            reponsesISI["isi_" + idx] = val;
          };
 
          var span = document.createElement("span");
          span.textContent = item.echelle[val];
 
          label.appendChild(input);
          label.appendChild(span);
          echelleDiv.appendChild(label);
        })(j);
      }
 
      bloc.appendChild(echelleDiv);
      conteneur.appendChild(bloc);
    })(i);
  }
}
 
// 11. Soumission du questionnaire, calcul du score ISI et envoi des données
function soumettre() {
  var i;
  var total = 0;
  var complet = true;
 
  for (i = 0; i < 7; i++) {
    if (reponsesISI["isi_" + i] === undefined) {
      complet = false;
    } else {
      total = total + reponsesISI["isi_" + i];
    }
  }
 
  if (!complet) {
    document.getElementById("erreurISI").style.display = "block";
    return;
  }
  document.getElementById("erreurISI").style.display = "none";
 
  var interpretationCode;
  var categorieTexte;
  var messageTexte;
  if (total <= 7) {
    interpretationCode = "absence";
    categorieTexte = T[lng].catAbsence;
    messageTexte = T[lng].msgAbsence;
  } else if (total <= 14) {
    interpretationCode = "legere";
    categorieTexte = T[lng].catLegere;
    messageTexte = T[lng].msgLegere;
  } else if (total <= 21) {
    interpretationCode = "moderee";
    categorieTexte = T[lng].catModeree;
    messageTexte = T[lng].msgModeree;
  } else {
    interpretationCode = "severe";
    categorieTexte = T[lng].catSevere;
    messageTexte = T[lng].msgSevere;
  }
 
  document.getElementById("scoreTotal").textContent = T[lng].scoreLabelPrefix + total + " / 28";
 
  var elInterp = document.getElementById("interpretationTxt");
  elInterp.innerHTML = "";
  var spanCat = document.createElement("span");
  spanCat.className = "cat";
  spanCat.textContent = categorieTexte;
  var spanMsg = document.createElement("span");
  spanMsg.textContent = messageTexte;
  elInterp.appendChild(spanCat);
  elInterp.appendChild(spanMsg);
  elInterp.className = "interpretation " + interpretationCode;
 
  document.getElementById("jaugeMarqueur").style.left = "0%";
 
  allerA(4);
 
  setTimeout(function () {
    var pourcentageScore = (total / 28) * 100;
    document.getElementById("jaugeMarqueur").style.left = pourcentageScore + "%";
  }, 150);
 
  var duree = Math.round((Date.now() - tDebut) / 1000);
 
  var entree = {
    timestamp: new Date().toISOString(),
    langue: lng,
    age: demo.age,
    sexe: demo.sexe,
    filiere: demo.filiere,
    annee: demo.annee,
    residence: demo.residence,
    cafeine: facteurs.cafeine,
    ecrans: facteurs.ecrans,
    duree_sommeil: facteurs.dureeSommeil,
    activite_physique: facteurs.activitePhysique,
    stress_academique: facteurs.stressAcademique,
    charge_travail: facteurs.chargeTravail,
    tabac: facteurs.tabac,
    alcool: facteurs.alcool,
    sieste: facteurs.sieste,
    somniferes: facteurs.somniferes,
    score_total: total,
    interpretation: interpretationCode,
    duree_secondes: duree
  };
 
  for (i = 0; i < 7; i++) {
    entree["isi_" + (i + 1)] = reponsesISI["isi_" + i];
  }
 
  envoyerDonnees(entree);
}
 
// 12. Envoi des données vers Google Sheets via formulaire caché (pas de fetch)
function envoyerDonnees(entree) {
  try {
    var form = document.createElement("form");
    form.method = "POST";
    form.action = SHEETS_URL;
    form.target = "_gs_frame";
    form.style.display = "none";
 
    var cle;
    for (cle in entree) {
      if (entree.hasOwnProperty(cle)) {
        var champCache = document.createElement("input");
        champCache.type = "hidden";
        champCache.name = cle;
        champCache.value = entree[cle];
        form.appendChild(champCache);
      }
    }
 
    document.body.appendChild(form);
    form.submit();
 
    setTimeout(function () {
      if (form.parentNode) {
        form.parentNode.removeChild(form);
      }
    }, 2000);
 
    sauvegarderLocal(entree);
    afficherToast(T[lng].toastOk, "ok");
  } catch (erreur) {
    sauvegarderLocal(entree);
    afficherToast(T[lng].toastErreur, "erreur");
  }
}
 
// 13. Sauvegarde locale de secours (localStorage)
function sauvegarderLocal(entree) {
  try {
    var brut = localStorage.getItem("isi_etude");
    var liste = brut ? JSON.parse(brut) : [];
    liste.push(entree);
    localStorage.setItem("isi_etude", JSON.stringify(liste));
  } catch (erreur) {
    // localStorage indisponible (navigation privée, etc.) — on ignore
  }
}
 
// 14. Affichage d'un message toast temporaire
function afficherToast(msg, cls) {
  var toast = document.getElementById("toast");
  toast.textContent = msg;
  toast.className = "toast" + (cls === "erreur" ? " erreur" : "");
  toast.style.display = "block";
  setTimeout(function () {
    toast.style.display = "none";
  }, 3000);
}
